<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NM2DB Search</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --panel: #fffdf9;
      --text: #1f2933;
      --muted: #52606d;
      --line: #d9cbb8;
      --accent: #0f766e;
      --accent-2: #134e4a;
    }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #efe7da 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(31, 41, 51, 0.08);
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }
    p {
      color: var(--muted);
      margin: 0 0 20px;
    }
    form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      margin-bottom: 20px;
    }
    input, button {
      font: inherit;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
    }
    input {
      background: #fff;
    }
    button {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      cursor: pointer;
    }
    button:hover {
      background: var(--accent-2);
    }
    .meta {
      margin: 12px 0 16px;
      color: var(--muted);
    }
    .error {
      color: #b42318;
      margin: 12px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      text-align: left;
      vertical-align: top;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
    }
    th {
      font-size: 0.95rem;
    }
    td pre {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 0.85rem;
    }
    .empty {
      color: var(--muted);
      padding: 16px 0 0;
    }
    a {
      color: var(--accent-2);
    }
    @media (max-width: 800px) {
      form {
        grid-template-columns: 1fr;
      }
      table, thead, tbody, tr, th, td {
        display: block;
      }
      thead {
        display: none;
      }
      tr {
        border-top: 1px solid var(--line);
        padding: 10px 0;
      }
      td {
        border-top: 0;
        padding: 6px 0;
      }
      td::before {
        content: attr(data-label) ": ";
        font-weight: bold;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>NM2DB Keyword Search</h1>
      <p>Simple HTML client for the plugin API.</p>

      <form id="search-form">
        <input id="keyword" name="keyword" type="text" placeholder="Search keyword, for example perl">
        <button type="submit">Search</button>
      </form>

      <div id="meta" class="meta"></div>
      <div id="error" class="error"></div>
      <div id="results"></div>
    </div>
  </div>

  <script>
    const apiUrl = "/api/v1/contrib/nm2db_keyword_search/search";
    const form = document.getElementById("search-form");
    const keywordInput = document.getElementById("keyword");
    const meta = document.getElementById("meta");
    const error = document.getElementById("error");
    const results = document.getElementById("results");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderResults(payload) {
      const rows = Array.isArray(payload.results) ? payload.results : [];
      meta.textContent = rows.length
        ? `Keyword: ${payload.keyword || ""} | Results: ${payload.count || rows.length}`
        : `Keyword: ${payload.keyword || ""} | No results`;

      if (!rows.length) {
        results.innerHTML = '<div class="empty">No results found.</div>';
        return;
      }

      results.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Biblionumber</th>
              <th>Tag</th>
              <th>Value</th>
              <th>XML</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((row) => `
              <tr>
                <td data-label="Biblionumber">
                  <a href="/cgi-bin/koha/opac-detail.pl?biblionumber=${encodeURIComponent(row.biblionumber)}">${escapeHtml(row.biblionumber)}</a>
                </td>
                <td data-label="Tag">${escapeHtml(row.tag || "")}</td>
                <td data-label="Value">${escapeHtml(row.value || "")}</td>
                <td data-label="XML"><pre>${escapeHtml(row.xml || "")}</pre></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    async function search(keyword) {
      error.textContent = "";
      meta.textContent = "Loading...";
      results.innerHTML = "";

      try {
        const response = await fetch(`${apiUrl}?keyword=${encodeURIComponent(keyword)}`, {
          headers: { "Accept": "application/json" }
        });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const payload = await response.json();
        renderResults(payload);
      } catch (err) {
        meta.textContent = "";
        error.textContent = `Request failed: ${err.message}`;
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      search(keywordInput.value.trim());
    });

    const params = new URLSearchParams(window.location.search);
    const initialKeyword = params.get("keyword");
    if (initialKeyword) {
      keywordInput.value = initialKeyword;
      search(initialKeyword);
    }
  </script>
</body>
</html>
